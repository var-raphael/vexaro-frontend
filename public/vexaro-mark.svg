<svg width="44" height="42" viewBox="0 0 44 42" fill="none" xmlns="http://www.w3.org/2000/svg" style="overflow:visible;">
  <defs>
    <filter id="vx-glow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="1.8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <style>
      .vx-raw-base {
        opacity: 0.35;
      }
      .vx-raw-dash {
        stroke-dasharray: 8 4;
        stroke-dashoffset: 0;
        opacity: 0.5;
        animation: vx-transmit 1.8s linear infinite;
      }
      @keyframes vx-transmit {
        to { stroke-dashoffset: -36; }
      }

      .vx-apex-dot {
        animation: vx-heartbeat 2.4s ease-in-out infinite;
      }
      @keyframes vx-heartbeat {
        0%,100% { r: 2.5; opacity: 1; }
        40%     { r: 3.8; opacity: 0.7; }
        55%     { r: 2.2; opacity: 1; }
        70%     { r: 3.2; opacity: 0.8; }
        85%     { r: 2.5; opacity: 1; }
      }

      .vx-apex-halo {
        animation: vx-halo 2.4s ease-in-out infinite;
      }
      @keyframes vx-halo {
        0%,100% { r: 6;  opacity: 0.08; }
        40%     { r: 10; opacity: 0.18; }
        55%     { r: 5;  opacity: 0.06; }
        70%     { r: 8;  opacity: 0.14; }
        85%     { r: 6;  opacity: 0.08; }
      }

      .vx-apex-ring {
        animation: vx-ring 2.4s ease-in-out infinite;
        fill: none;
      }
      @keyframes vx-ring {
        0%,55%,100% { r: 0;  opacity: 0;    stroke-width: 1;   }
        40%         { r: 14; opacity: 0.12; stroke-width: 0.5; }
        54%         { r: 18; opacity: 0;    stroke-width: 0.2; }
      }
    </style>
  </defs>

  <!-- Raw left arm — base -->
  <path
    class="vx-raw-base"
    d="M3 7 L6 11 L8.5 5 L11.5 13 L14 8 L22 34"
    stroke="#22d3ee" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none"
  />
  <!-- Raw left arm — travelling dash -->
  <path
    class="vx-raw-dash"
    d="M3 7 L6 11 L8.5 5 L11.5 13 L14 8 L22 34"
    stroke="#67e8f9" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" fill="none"
  />

  <!-- Clean right arm -->
  <path
    d="M22 34 L41 7"
    stroke="#22d3ee" stroke-width="4" stroke-linecap="round" fill="none"
  />

  <!-- Apex ring -->
  <circle class="vx-apex-ring" cx="22" cy="34" r="0" stroke="#22d3ee"/>
  <!-- Apex halo -->
  <circle class="vx-apex-halo" cx="22" cy="34" r="6" fill="#22d3ee" filter="url(#vx-glow)"/>
  <!-- Apex dot -->
  <circle class="vx-apex-dot" cx="22" cy="34" r="2.5" fill="#22d3ee"/>
</svg>